<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compiler</title>
</head>
<body>

<h2>CMPT 432 Compiler</h2>

<label for="input">Source Code:</label><br>

<textarea id="input" rows="15" cols="80" placeholder="Enter your program here...">{intfintif=3}$</textarea>

<br><br>

<button id="compileBtn">Compile</button>

<pre id="output"></pre>

<script type="module">
import { BrowserRunner } from "./distrib/compiler/BrowserRunner.js";

const button = document.getElementById("compileBtn");
const input = document.getElementById("input");
const output = document.getElementById("output");

button.addEventListener("click", () => {
    const result = BrowserRunner.run(input.value);
    output.textContent = result;
});
</script>

</body>
</html>
