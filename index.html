<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compiler</title>

    <style>
        body {
            font-family: monospace;
            margin: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        textarea, pre {
            width: 100%;
            height: 400px;
            padding: 10px;
            border: 1px solid #999;
            border-radius: 5px;
            overflow: auto;
            background: #f9f9f9;
            font-family: monospace;
            font-size: 14px;
            white-space: pre;
        }

        #codegenOutput {
            height: 220px;
            background: #eef7ee;
        }

        button {
            margin: 15px 0;
            padding: 10px 16px;
            font-size: 16px;
            cursor: pointer;
        }

        h3 {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<h2>CMPT 432 Compiler</h2>

<div class="container">
    <div class="panel">
        <label for="input"><h3>Input</h3></label>
        <textarea id="input" placeholder="Enter your program here..." title="Compiler input"></textarea>
    </div>

    <div class="panel">
        <label for="output"><h3>Compiler Output</h3></label>
        <pre id="output"></pre>
    </div>
</div>

<button id="compileBtn">Compile</button>

<div class="panel">
    <label for="codegenOutput"><h3>Code Generation Output</h3></label>
    <pre id="codegenOutput"></pre>
</div>

<div class="panel">
    <label for="tsOutput"><h3>Generated TypeScript</h3></label>
    <pre id="tsOutput"></pre>
</div>
<div class="panel">
    <label for="llvmOutput"><h3>Generated LLVM IR</h3></label>
    <pre id="llvmOutput"></pre>
</div>

<script type="module">
import * as CompilerModule from "./distrib/compiler/BrowserRunner.js?v=7";

const button = document.getElementById("compileBtn");
const input = document.getElementById("input");
const output = document.getElementById("output");
const codegenOutput = document.getElementById("codegenOutput");
const tsOutput = document.getElementById("tsOutput");
const llvmOutput = document.getElementById("llvmOutput");

button.addEventListener("click", () => {
    const result = CompilerModule.BrowserRunner.run(input.value);

    output.textContent = result.fullOutput;
    codegenOutput.textContent = result.codeGenOutput;
    tsOutput.textContent = result.tsOutput;
    llvmOutput.textContent = result.llvmirOutput;
});
</script>

</body>
</html>
